name: Full Workflow (Manual)

on:
  workflow_dispatch:

jobs:
  fetch-repos:
    name: Fetch Top Repos
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch repos (all time, 50000+ stars)
        run: node fetch-repos-alltime-50000stars.js

      - name: Fetch repos (2 years, 10000+ stars)
        run: node fetch-repos-2years-10000stars.js

      - name: Fetch repos (90 days, 1000+ stars)
        run: node fetch-repos-90days-1000stars.js

      - name: Fetch repos (30 days, 100-999 stars)
        run: node fetch-repos-30days-100-999stars.js

      - name: Fetch repos (3 days, 50-99 stars)
        run: node fetch-repos-3days-50-99stars.js

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --staged --quiet || git commit -m "Update repos data $(date -u +%Y-%m-%d)"
          git push

  pick-random-repos:
    name: Pick Random Repos
    runs-on: ubuntu-latest
    needs: fetch-repos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pick random repos
        run: node pick-random-repos.js

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add site/repos.json
          git diff --staged --quiet || git commit -m "Add random repos $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

  deploy-site:
    name: Deploy Site to FTP
    runs-on: ubuntu-latest
    needs: pick-random-repos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to FTP (repotrend.com)
        uses: SamKirkland/FTP-Deploy-Action@4.3.3
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: site/
          server-dir: /public_html/repotrend.com/

      - name: Deploy to FTP (te9.dev)
        uses: SamKirkland/FTP-Deploy-Action@4.3.3
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: site/
          server-dir: /public_html/te9.dev/repotrend/

  post-to-bsky:
    name: Post to Bluesky
    runs-on: ubuntu-latest
    needs: deploy-site

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Post to Bluesky
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
          MARKUPGO_API_KEY: ${{ secrets.MARKUPGO_API_KEY }}
        run: npm run post-to-bsky

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add bsky/posted-repos.json
          git diff --staged --quiet || git commit -m "Update posted repos tracking $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
