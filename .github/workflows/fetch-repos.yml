name: Fetch Top Repos

on:
  schedule:
    # Run 4 times a day at 00:00, 06:00, 12:00, 18:00 UTC
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch repos (all time, 50000+ stars)
        run: node fetch-repos-alltime-50000stars.js

      - name: Fetch repos (2 years, 10000+ stars)
        run: node fetch-repos-2years-10000stars.js

      - name: Fetch repos (90 days, 1000+ stars)
        run: node fetch-repos-90days-1000stars.js

      - name: Fetch repos (30 days, 100-999 stars)
        run: node fetch-repos-30days-100-999stars.js

      - name: Fetch repos (3 days, 50-99 stars)
        run: node fetch-repos-3days-50-99stars.js

      - name: Commit and push changes
        run: |
          git config --local user.email "creatuluw@users.noreply.github.com"
          git config --local user.name "creatuluw"
          git remote set-url origin https://x-access-token:${{ secrets.PAT }}@github.com/${{ github.repository }}.git
          git add data/
          git diff --staged --quiet || git commit -m "Update repos data $(date -u +%Y-%m-%d)"
          git push
