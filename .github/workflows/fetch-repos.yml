name: Fetch Top Repos

on:
  schedule:
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:

concurrency:
  group: fetch-repos
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync with remote and run all fetch scripts
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git

          # Clean any leftover state and sync with remote FIRST
          git checkout -- .
          git clean -fd
          git fetch origin ${{ github.ref_name }}
          git reset --hard origin/${{ github.ref_name }}

          # Now run all fetch scripts
          node fetch-repos-alltime-50000stars.js
          node fetch-repos-2years-10000stars.js
          node fetch-repos-90days-1000stars.js
          node fetch-repos-30days-100-999stars.js
          node fetch-repos-3days-50-99stars.js

          # Commit and push changes
          git add data/
          if ! git diff --staged --quiet; then
            git commit -m "Update repos data $(date -u +%Y-%m-%d)"
            git push origin HEAD:${{ github.ref_name }}
          fi
