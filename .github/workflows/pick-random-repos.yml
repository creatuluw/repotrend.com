name: Pick Random Repos

on:
  schedule:
    # Run every 8 hours: 0, 8, 16 UTC
    - cron: "0 0,8,16 * * *"
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: pick-random-repos
  cancel-in-progress: true

jobs:
  pick:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pick random repos
        run: node pick-random-repos.js

      - name: Generate repo HTML pages
        run: node generate-repo-pages.js
        env:
          MARKUPGO_API_KEY: ${{ secrets.MARKUPGO_API_KEY }}

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git add site/repos.json site/repo/
          git diff --staged --quiet || git commit -m "Add random repos and generate pages $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin HEAD:${{ github.ref_name }}
