name: Bluesky Every 2 Hours

on:
  schedule:
    - cron: "0 */2 * * *" # Every 2 hours at minute 0
  workflow_dispatch:

concurrency:
  group: bluesky-every-2h
  cancel-in-progress: true

jobs:
  pick-and-generate:
    name: Pick Repos & Generate Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Pick random repos
        env:
          MARKUPGO_API_KEY: ${{ secrets.MARKUPGO_API_KEY }}
        run: node pick-random-repos.js

      - name: Generate repo HTML pages
        run: node generate-repo-pages.js
        env:
          MARKUPGO_API_KEY: ${{ secrets.MARKUPGO_API_KEY }}

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git

          # Stage the files we want to commit
          git add site/repos.json site/repo/

          # Check if there's anything to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          # Stash our changes to preserve them
          git stash push -m "workflow-changes-$(date +%s)"

          # Sync with remote (clean state)
          git fetch origin ${{ github.ref_name }}
          git reset --hard origin/${{ github.ref_name }}
          git clean -fd

          # Restore our changes
          git stash pop

          # Re-stage and commit
          git add site/repos.json site/repo/
          git commit -m "Add random repos and generate pages $(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Push
          git push origin HEAD:${{ github.ref_name }}

  deploy:
    name: Deploy Site to FTP
    runs-on: ubuntu-latest
    needs: pick-and-generate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Deploy to FTP (repotrend.com)
        uses: SamKirkland/FTP-Deploy-Action@4.3.3
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: site/
          server-dir: /public_html/repotrend.com/

      - name: Deploy to FTP (te9.dev)
        uses: SamKirkland/FTP-Deploy-Action@4.3.3
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: site/
          server-dir: /public_html/te9.dev/repotrend/

  post-to-bsky:
    name: Post to Bluesky
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Post to Bluesky
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
          MARKUPGO_API_KEY: ${{ secrets.MARKUPGO_API_KEY }}
        run: npm run post-to-bsky

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git

          # Stage the files we want to commit
          git add bsky/posted-repos.json

          # Check if there's anything to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          # Stash our changes to preserve them
          git stash push -m "bsky-changes-$(date +%s)"

          # Sync with remote (clean state)
          git fetch origin ${{ github.ref_name }}
          git reset --hard origin/${{ github.ref_name }}
          git clean -fd

          # Restore our changes
          git stash pop

          # Re-stage and commit
          git add bsky/posted-repos.json
          git commit -m "Update posted repos tracking $(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Push
          git push origin HEAD:${{ github.ref_name }}
