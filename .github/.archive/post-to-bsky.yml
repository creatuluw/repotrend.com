name: Post to Bluesky (Manual Only)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Post to Bluesky
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
          MARKUPGO_API_KEY: ${{ secrets.MARKUPGO_API_KEY }}
        run: npm run post-to-bsky

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add bsky/posted-repos.json
          git diff --staged --quiet || git commit -m "Update posted repos tracking $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
