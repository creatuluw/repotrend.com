<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OG Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Lekton:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Lekton', sans-serif;
      background-color: #0d1117;
      color: #c9d1d9;
      width: 1200px;
      height: 630px;
      display: flex;
      overflow: hidden;
    }

    .card {
      display: flex;
      width: 100%;
      height: 100%;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      overflow: hidden;
    }

    .accent-bar {
      width: 6px;
      background: linear-gradient(180deg, #ff9500 0%, #00ff88 100%);
      flex-shrink: 0;
    }

    .content {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 48px;
      width: 100%;
      height: 100%;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .brand {
      font-size: 20px;
      color: #8b949e;
      font-family: 'JetBrains Mono', monospace;
    }

    .trending-badge {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 600;
      color: #ff9500;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .main {
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex: 1;
      justify-content: center;
    }

    .repo-name {
      font-size: 48px;
      font-weight: 700;
      color: #58a6ff;
      font-family: 'JetBrains Mono', monospace;
      line-height: 1.2;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .owner {
      font-size: 24px;
      color: #8b949e;
    }

    .description {
      font-size: 24px;
      line-height: 1.4;
      color: #c9d1d9;
      max-height: 80px;
      overflow: hidden;
    }

    .topics {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }

    .topic {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 6px 14px;
      font-size: 16px;
      font-weight: 500;
      color: #7ee787;
      font-family: 'JetBrains Mono', monospace;
    }

    .footer {
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 20px;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
    }

    .stat-stars {
      color: #e3b341;
    }

    .stat-forks {
      color: #8b949e;
    }

    .language {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 20px;
      font-weight: 500;
      font-family: 'JetBrains Mono', monospace;
      color: #c9d1d9;
    }

    .lang-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
    }

    .lang-javascript { background-color: #f1e05a; }
    .lang-typescript { background-color: #3178c6; }
    .lang-python { background-color: #3572A5; }
    .lang-rust { background-color: #dea584; }
    .lang-go { background-color: #00ADD8; }
    .lang-cpp { background-color: #f34b7d; }
    .lang-java { background-color: #b07219; }
    .lang-ruby { background-color: #701516; }
    .lang-php { background-color: #4F5D95; }
    .lang-swift { background-color: #ff9500; }
    .lang-kotlin { background-color: #A97BFF; }
    .lang-default { background-color: #8b949e; }

    .github-link {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      font-size: 18px;
      color: #8b949e;
      font-family: 'JetBrains Mono', monospace;
    }

    .github-icon {
      width: 24px;
      height: 24px;
      fill: #c9d1d9;
    }

    .emoji {
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="accent-bar"></div>
    <div class="content">
      <div class="header">
        <span class="brand">te9.dev</span>
        <span class="trending-badge">Trending</span>
      </div>

      <div class="main">
        <div class="repo-name">{{REPO_NAME}}</div>
        <div class="owner">by {{OWNER_NAME}}</div>
        <div class="description">{{DESCRIPTION}}</div>
        <div class="topics">
          {{#each TOPICS}}
          <span class="topic">{{this}}</span>
          {{/each}}
        </div>
      </div>

      <div class="footer">
        <div class="stat stat-stars">
          <span class="emoji">⭐</span>
          <span>{{STARS}}</span>
        </div>
        <div class="stat stat-forks">
          <span class="emoji">🍴</span>
          <span>{{FORKS}}</span>
        </div>
        <div class="language">
          <div class="lang-dot lang-{{LANGUAGE_CSS}}"></div>
          <span>{{LANGUAGE}}</span>
        </div>
        <div class="github-link">
          <svg class="github-icon" viewBox="0 0 24 24">

          </svg>
          <span>{{OWNER_NAME}}</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
