<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Trending Repos — te9.dev</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Lekton:wght@400;700&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --bg-primary: #0a0a0a;
                --bg-secondary: #141414;
                --bg-card: #1a1a1a;
                --bg-card-hover: #222222;
                --text-primary: #ededed;
                --text-secondary: #a0a0a0;
                --text-muted: #666;
                --accent: #ff6b35;
                --accent-hover: #ff8555;
                --border: #2a2a2a;
                --success: #22c55e;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: "Bricolage Grotesque", system-ui, sans-serif;
                background: var(--bg-primary);
                color: var(--text-primary);
                line-height: 1.6;
                min-height: 100vh;
            }

            .container {
                max-width: 1400px;
                margin: 0 auto;
                padding: 0 24px;
            }

            /* Nav */
            nav {
                background: rgba(10, 10, 10, 0.8);
                backdrop-filter: blur(12px);
                border-bottom: 1px solid var(--border);
                position: sticky;
                top: 0;
                z-index: 100;
            }

            nav .container {
                display: flex;
                justify-content: space-between;
                align-items: center;
                height: 64px;
            }

            .logo {
                font-family: "Lekton", monospace;
                font-size: 1.5rem;
                font-weight: 700;
                color: var(--text-primary);
                text-decoration: none;
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .logo span {
                color: var(--accent);
            }

            .nav-links {
                display: flex;
                gap: 32px;
                list-style: none;
            }

            .nav-links a {
                color: var(--text-secondary);
                text-decoration: none;
                font-size: 0.95rem;
                transition: color 0.2s;
            }

            .nav-links a:hover {
                color: var(--text-primary);
            }

            /* Hero */
            .hero {
                padding: 80px 0 60px;
                text-align: center;
            }

            .hero h1 {
                font-size: 3.5rem;
                font-weight: 700;
                margin-bottom: 16px;
                background: linear-gradient(
                    135deg,
                    var(--text-primary) 0%,
                    var(--accent) 100%
                );
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }

            .hero p {
                font-size: 1.25rem;
                color: var(--text-secondary);
                max-width: 600px;
                margin: 0 auto 32px;
            }

            .stats {
                display: flex;
                justify-content: center;
                gap: 48px;
                flex-wrap: wrap;
            }

            .stat {
                text-align: center;
            }

            .stat-value {
                font-size: 2.5rem;
                font-weight: 700;
                color: var(--accent);
                font-family: "JetBrains Mono", monospace;
            }

            .stat-label {
                font-size: 0.875rem;
                color: var(--text-muted);
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }

            /* Filter Tabs */
            .filters {
                display: flex;
                justify-content: center;
                gap: 12px;
                margin-bottom: 40px;
                flex-wrap: wrap;
            }

            .filter-btn {
                background: var(--bg-secondary);
                border: 1px solid var(--border);
                color: var(--text-secondary);
                padding: 10px 20px;
                border-radius: 8px;
                cursor: pointer;
                font-family: inherit;
                font-size: 0.9rem;
                transition: all 0.2s;
            }

            .filter-btn:hover {
                border-color: var(--text-muted);
                color: var(--text-primary);
            }

            .filter-btn.active {
                background: var(--accent);
                border-color: var(--accent);
                color: white;
            }

            /* Repo Grid */
            .repos-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
                gap: 20px;
                margin-bottom: 48px;
            }

            /* Repo Card */
            .repo-card {
                background: var(--bg-card);
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 20px;
                transition: all 0.2s;
                position: relative;
            }

            .repo-card:hover {
                background: var(--bg-card-hover);
                border-color: var(--text-muted);
                transform: translateY(-2px);
            }

            .rank-badge {
                position: absolute;
                top: 16px;
                right: 16px;
                background: var(--bg-secondary);
                border: 1px solid var(--border);
                padding: 4px 10px;
                border-radius: 6px;
                font-size: 0.75rem;
                font-weight: 600;
                color: var(--text-muted);
                font-family: "JetBrains Mono", monospace;
            }

            .repo-card.rank-1 .rank-badge {
                background: linear-gradient(135deg, #ffd700, #ffaa00);
                border-color: #ffd700;
                color: #000;
            }

            .repo-card.rank-2 .rank-badge {
                background: linear-gradient(135deg, #c0c0c0, #a0a0a0);
                border-color: #c0c0c0;
                color: #000;
            }

            .repo-card.rank-3 .rank-badge {
                background: linear-gradient(135deg, #cd7f32, #b5651d);
                border-color: #cd7f32;
                color: #000;
            }

            .card-header {
                display: flex;
                align-items: center;
                gap: 12px;
                margin-bottom: 12px;
            }

            .repo-avatar {
                width: 40px;
                height: 40px;
                border-radius: 8px;
                object-fit: cover;
            }

            .owner-name {
                color: var(--text-secondary);
                font-size: 0.9rem;
            }

            .repo-name {
                font-size: 1.25rem;
                font-weight: 600;
                color: var(--text-primary);
                text-decoration: none;
                display: block;
                margin-bottom: 8px;
                word-break: break-word;
            }

            .repo-name:hover {
                color: var(--accent);
            }

            .repo-desc {
                color: var(--text-secondary);
                font-size: 0.9rem;
                margin-bottom: 16px;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
                min-height: 2.8em;
            }

            .card-footer {
                display: flex;
                justify-content: space-between;
                align-items: center;
                flex-wrap: wrap;
                gap: 12px;
            }

            .meta {
                display: flex;
                gap: 16px;
                flex-wrap: wrap;
            }

            .meta-item {
                display: flex;
                align-items: center;
                gap: 6px;
                color: var(--text-muted);
                font-size: 0.85rem;
                font-family: "JetBrains Mono", monospace;
            }

            .meta-item svg {
                width: 16px;
                height: 16px;
                fill: currentColor;
            }

            .lang-dot {
                width: 10px;
                height: 10px;
                border-radius: 50%;
                background: var(--accent);
            }

            .lang-dot.js {
                background: #f7df1e;
            }
            .lang-dot.ts {
                background: #3178c6;
            }
            .lang-dot.python {
                background: #3572a5;
            }
            .lang-dot.rust {
                background: #dea584;
            }
            .lang-dot.go {
                background: #00add8;
            }
            .lang-dot.java {
                background: #b07219;
            }
            .lang-dot.c {
                background: #555555;
            }
            .lang-dot.cpp {
                background: #f34b7d;
            }
            .lang-dot.ruby {
                background: #701516;
            }
            .lang-dot.php {
                background: #4f5d95;
            }
            .lang-dot.swift {
                background: #ffac45;
            }
            .lang-dot.kotlin {
                background: #a97bff;
            }
            .lang-dot.dart {
                background: #00b4ab;
            }

            .share-btn {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                background: linear-gradient(135deg, #1185fe 0%, #0f69ff 100%);
                color: white;
                padding: 8px 14px;
                border-radius: 6px;
                text-decoration: none;
                font-size: 0.85rem;
                font-weight: 500;
                transition: all 0.2s;
            }

            .share-btn:hover {
                transform: scale(1.05);
                box-shadow: 0 4px 12px rgba(17, 133, 254, 0.3);
            }

            .share-btn svg {
                width: 16px;
                height: 16px;
            }

            /* Pagination */
            .pagination {
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 8px;
                margin-bottom: 80px;
                flex-wrap: wrap;
            }

            .page-btn {
                background: var(--bg-secondary);
                border: 1px solid var(--border);
                color: var(--text-secondary);
                width: 44px;
                height: 44px;
                border-radius: 8px;
                cursor: pointer;
                font-family: inherit;
                font-size: 0.95rem;
                transition: all 0.2s;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .page-btn:hover:not(:disabled) {
                border-color: var(--text-muted);
                color: var(--text-primary);
            }

            .page-btn:disabled {
                opacity: 0.4;
                cursor: not-allowed;
            }

            .page-btn.active {
                background: var(--accent);
                border-color: var(--accent);
                color: white;
            }

            .page-btn.nav {
                width: auto;
                padding: 0 16px;
            }

            .page-info {
                color: var(--text-muted);
                font-size: 0.9rem;
                padding: 0 16px;
            }

            /* Footer */
            footer {
                border-top: 1px solid var(--border);
                padding: 40px 0;
                text-align: center;
            }

            footer p {
                color: var(--text-muted);
                font-size: 0.9rem;
            }

            footer a {
                color: var(--accent);
                text-decoration: none;
            }

            footer a:hover {
                text-decoration: underline;
            }

            /* Loading */
            .loading {
                text-align: center;
                padding: 80px 0;
                color: var(--text-muted);
            }

            .loading-spinner {
                width: 48px;
                height: 48px;
                border: 3px solid var(--border);
                border-top-color: var(--accent);
                border-radius: 50%;
                animation: spin 1s linear infinite;
                margin: 0 auto 16px;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            /* Empty State */
            .empty-state {
                text-align: center;
                padding: 80px 20px;
                color: var(--text-muted);
            }

            .empty-state svg {
                width: 64px;
                height: 64px;
                margin-bottom: 16px;
                opacity: 0.5;
            }

            /* Responsive */
            @media (max-width: 768px) {
                .hero h1 {
                    font-size: 2.5rem;
                }

                .stats {
                    gap: 24px;
                }

                .repos-grid {
                    grid-template-columns: 1fr;
                }
            }
        </style>
    </head>
    <body>
        <nav>
            <div class="container">
                <a href="/" class="logo">te9<span>.dev</span></a>
                <ul class="nav-links">
                    <li><a href="/">Home</a></li>
                    <li><a href="/about">About</a></li>
                    <li><a href="/projects">Projects</a></li>
                </ul>
            </div>
        </nav>

        <main class="container">
            <section class="hero">
                <h1>Trending Repos</h1>
                <p>
                    Discover the most interesting open source projects, curated
                    daily from GitHub.
                </p>
                <div class="stats">
                    <div class="stat">
                        <div class="stat-value" id="total-repos">—</div>
                        <div class="stat-label">Total Repos</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="total-pages">—</div>
                        <div class="stat-label">Pages</div>
                    </div>
                </div>
            </section>

            <div class="filters">
                <button class="filter-btn active" data-filter="all">
                    All Repos
                </button>
                <button class="filter-btn" data-filter="high">
                    High Stars (1000+)
                </button>
                <button class="filter-btn" data-filter="mid">
                    Mid Range (100-999)
                </button>
                <button class="filter-btn" data-filter="low">
                    Rising (50-99)
                </button>
            </div>

            <div class="repos-grid" id="repos-grid">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>Loading repositories...</p>
                </div>
            </div>

            <div class="pagination" id="pagination"></div>
        </main>

        <footer>
            <div class="container">
                <p>
                    Built with ❤️ by <a href="https://te9.dev">te9.dev</a> •
                    Data from <a href="https://github.com">GitHub</a>
                </p>
            </div>
        </footer>

        <script>
            const PER_PAGE = 50;
            let allRepos = [];
            let filteredRepos = [];
            let currentPage = 1;

            function formatNumber(num) {
                if (num >= 1000000) return (num / 1000000).toFixed(1) + "M";
                if (num >= 1000) return (num / 1000).toFixed(1) + "k";
                return num.toString();
            }

            function getLangClass(lang) {
                if (!lang) return "";
                return "lang-dot " + lang.toLowerCase().replace(/\s/g, "");
            }

            function createCard(repo, rank) {
                const rankClass = rank <= 3 ? `rank-${rank}` : "";
                const shareText = `Check out "${repo.name}" by ${repo.owner.login}: ${repo.html_url}`;
                const shareUrl = `https://bsky.app/intent/compose?text=${encodeURIComponent(shareText)}`;

                return `
                <div class="repo-card ${rankClass}">
                    <div class="rank-badge">#${rank}</div>
                    <div class="card-header">
                        <img src="${repo.owner.avatar_url}" alt="${repo.owner.login}" class="repo-avatar" loading="lazy">
                        <span class="owner-name">${repo.owner.login}</span>
                    </div>
                    <a href="${repo.html_url}" target="_blank" rel="noopener noreferrer" class="repo-name">${repo.name}</a>
                    <p class="repo-desc">${repo.description || "No description provided."}</p>
                    <div class="card-footer">
                        <div class="meta">
                            <div class="meta-item">
                                <svg viewBox="0 0 16 16"><path fill-rule="evenodd" d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z"></path></svg>
                                ${formatNumber(repo.stargazers_count)}
                            </div>
                            <div class="meta-item">
                                <svg viewBox="0 0 16 16"><path fill-rule="evenodd" d="M5 3.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm0 2.122a2.25 2.25 0 10-1.5 0v.878A2.25 2.25 0 005.75 8.5h1.5v2.128a2.251 2.251 0 101.5 0V8.5h1.5a2.25 2.25 0 002.25-2.25v-.878a2.25 2.25 0 10-1.5 0v.878a.75.75 0 01-.75.75h-4.5A.75.75 0 015 6.25v-.878zm3.75 7.378a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm3-8.75a.75.75 0 100-1.5.75.75 0 000 1.5z"></path></svg>
                                ${formatNumber(repo.forks_count)}
                            </div>
                            ${
                                repo.language
                                    ? `
                            <div class="meta-item">
                                <span class="${getLangClass(repo.language)}" style="display:inline-block; width:10px; height:10px; border-radius:50%; background:${getLangColor(repo.language)}"></span>
                                ${repo.language}
                            </div>
                            `
                                    : ""
                            }
                        </div>
                        <a href="${shareUrl}" target="_blank" rel="noopener noreferrer" class="share-btn">
                            <svg viewBox="0 0 600 530" xmlns="http://www.w3.org/2000/svg"><path d="m135.72 44.03c66.496 49.921 138.02 151.14 164.28 205.46 26.262-54.316 97.782-155.54 164.28-205.46 47.98-36.021 125.72-63.892 125.72 24.795 0 17.712-10.155 148.79-16.111 170.07-20.703 73.984-96.144 92.854-163.25 81.433 117.3 19.964 147.14 86.092 82.697 152.22-122.39 125.59-175.91-31.511-189.63-71.766-2.514-7.3797-3.6904-10.832-3.7077-7.8964-0.0174-2.9357-1.1937 0.51669-3.7077 7.8964-13.714 40.255-67.233 197.36-189.63 71.766-64.444-66.128-34.605-132.26 82.697-152.22-67.108 11.421-142.55-7.4491-163.25-81.433-5.9562-21.282-16.111-152.36-16.111-170.07 0-88.687 77.742-60.816 125.72-24.795z"/></svg>
                            Share
                        </a>
                    </div>
                </div>
            `;
            }

            function getLangColor(lang) {
                const colors = {
                    JavaScript: "#f7df1e",
                    TypeScript: "#3178c6",
                    Python: "#3572A5",
                    Rust: "#dea584",
                    Go: "#00ADD8",
                    Java: "#b07219",
                    C: "#555555",
                    "C++": "#f34b7d",
                    Ruby: "#701516",
                    PHP: "#4F5D95",
                    Swift: "#ffac45",
                    Kotlin: "#A97BFF",
                    Dart: "#00B4AB",
                    HTML: "#e34c26",
                    CSS: "#563d7c",
                    Shell: "#89e051",
                    Vue: "#41b883",
                    Svelte: "#ff3e00",
                    R: "#198CE7",
                };
                return colors[lang] || "#8b949e";
            }

            function renderRepos() {
                const grid = document.getElementById("repos-grid");
                const start = (currentPage - 1) * PER_PAGE;
                const end = start + PER_PAGE;
                const pageRepos = filteredRepos.slice(start, end);

                if (filteredRepos.length === 0) {
                    grid.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5m6 4.125l2.25 2.25m0 0l2.25 2.25M12 13.875l2.25-2.25M12 13.875l-2.25 2.25M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z"/>
                        </svg>
                        <p>No repositories found.</p>
                    </div>
                `;
                    return;
                }

                grid.innerHTML = pageRepos
                    .map((repo, i) => createCard(repo, start + i + 1))
                    .join("");
            }

            function renderPagination() {
                const totalPages = Math.ceil(filteredRepos.length / PER_PAGE);
                const pagination = document.getElementById("pagination");

                if (totalPages <= 1) {
                    pagination.innerHTML = "";
                    return;
                }

                let html = "";

                html += `<button class="page-btn nav" ${currentPage === 1 ? "disabled" : ""} onclick="goToPage(${currentPage - 1})">← Prev</button>`;

                const maxVisible = 5;
                let startPage = Math.max(
                    1,
                    currentPage - Math.floor(maxVisible / 2),
                );
                let endPage = Math.min(totalPages, startPage + maxVisible - 1);

                if (endPage - startPage < maxVisible - 1) {
                    startPage = Math.max(1, endPage - maxVisible + 1);
                }

                if (startPage > 1) {
                    html += `<button class="page-btn" onclick="goToPage(1)">1</button>`;
                    if (startPage > 2)
                        html += `<span class="page-info">...</span>`;
                }

                for (let i = startPage; i <= endPage; i++) {
                    html += `<button class="page-btn ${i === currentPage ? "active" : ""}" onclick="goToPage(${i})">${i}</button>`;
                }

                if (endPage < totalPages) {
                    if (endPage < totalPages - 1)
                        html += `<span class="page-info">...</span>`;
                    html += `<button class="page-btn" onclick="goToPage(${totalPages})">${totalPages}</button>`;
                }

                html += `<button class="page-btn nav" ${currentPage === totalPages ? "disabled" : ""} onclick="goToPage(${currentPage + 1})">Next →</button>`;

                pagination.innerHTML = html;
            }

            function goToPage(page) {
                const totalPages = Math.ceil(filteredRepos.length / PER_PAGE);
                if (page < 1 || page > totalPages) return;
                currentPage = page;
                renderRepos();
                renderPagination();
                window.scrollTo({ top: 0, behavior: "smooth" });
            }

            function filterRepos(filter) {
                if (filter === "all") {
                    filteredRepos = [...allRepos];
                } else if (filter === "high") {
                    filteredRepos = allRepos.filter(
                        (r) => r.stargazers_count >= 1000,
                    );
                } else if (filter === "mid") {
                    filteredRepos = allRepos.filter(
                        (r) =>
                            r.stargazers_count >= 100 &&
                            r.stargazers_count < 1000,
                    );
                } else if (filter === "low") {
                    filteredRepos = allRepos.filter(
                        (r) =>
                            r.stargazers_count >= 50 &&
                            r.stargazers_count < 100,
                    );
                }
                currentPage = 1;
                renderRepos();
                renderPagination();
            }

            async function loadRepos() {
                try {
                    const response = await fetch("repos.json");
                    if (!response.ok)
                        throw new Error("Failed to load repos.json");
                    allRepos = await response.json();
                    filteredRepos = [...allRepos];

                    document.getElementById("total-repos").textContent =
                        allRepos.length;
                    document.getElementById("total-pages").textContent =
                        Math.ceil(allRepos.length / PER_PAGE);

                    renderRepos();
                    renderPagination();
                } catch (error) {
                    console.error("Error loading repos:", error);
                    document.getElementById("repos-grid").innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/>
                        </svg>
                        <p>Failed to load repositories. Please try again later.</p>
                    </div>
                `;
                }
            }

            // Setup filter buttons
            document.querySelectorAll(".filter-btn").forEach((btn) => {
                btn.addEventListener("click", () => {
                    document
                        .querySelectorAll(".filter-btn")
                        .forEach((b) => b.classList.remove("active"));
                    btn.classList.add("active");
                    filterRepos(btn.dataset.filter);
                });
            });

            // Load repos on page load
            loadRepos();
        </script>
    </body>
</html>
