        <meta charset="UTF-8" />

        <title>GitHub Repo Grid Ranking</title>
        <style>
            :root {
                --bg-color: #0d1117;
                --card-bg: #161b22;
                --border-color: #30363d;
                --text-main: #c9d1d9;
                --text-muted: #8b949e;
                --accent-blue: #58a6ff;
                --accent-gold: #e3b341;
                --accent-green: #3fb950;
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans",
                    Helvetica, Arial, sans-serif;
                background-color: var(--bg-color);
                color: var(--text-main);
                margin: 0;
                padding: 0;
                line-height: 1.5;
            }

            .container {
                max-width: 1200px;
                margin: 40px auto;
                padding: 0 20px;
            }

            header {
                text-align: center;
                margin-bottom: 50px;
            }

            h1 {
                font-size: 2.5rem;
                font-weight: 600;
                margin-bottom: 10px;
                background: linear-gradient(
                    to right,
                    var(--accent-blue),
                    var(--accent-green)
                );
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            p.subtitle {
                color: var(--text-muted);
                font-size: 1.1rem;
            }

            /* --- GRID LAYOUT --- */
            #leaderboard {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
                gap: 24px;
            }

            /* --- CARD STYLES --- */
            .repo-card {
                background-color: var(--card-bg);
                border: 1px solid var(--border-color);
                border-radius: 8px;
                padding: 20px;
                display: flex;
                flex-direction: column;
                position: relative;
                transition:
                    transform 0.2s,
                    border-color 0.2s,
                    box-shadow 0.2s;
                height: 100%;
                box-sizing: border-box;
            }

            .repo-card:hover {
                border-color: var(--accent-blue);
                transform: translateY(-4px);
                box-shadow: 0 12px 28px rgba(0, 0, 0, 0.3);
            }

            /* Rank Badge */
            .rank-badge {
                position: absolute;
                top: -10px;
                right: 12px;
                background-color: var(--border-color);
                color: var(--text-muted);
                font-weight: 700;
                font-size: 0.9rem;
                padding: 4px 10px;
                border-radius: 12px;
                border: 1px solid var(--bg-color);
                z-index: 1;
            }

            /* Gold/Silver/Bronze Highlights */
            .repo-card.rank-1 {
                border-top: 3px solid var(--accent-gold);
            }
            .repo-card.rank-1 .rank-badge {
                background-color: var(--accent-gold);
                color: #000;
            }

            .repo-card.rank-2 {
                border-top: 3px solid #a8a8a8;
            }
            .repo-card.rank-2 .rank-badge {
                background-color: #a8a8a8;
                color: #000;
            }

            .repo-card.rank-3 {
                border-top: 3px solid #cd7f32;
            }
            .repo-card.rank-3 .rank-badge {
                background-color: #cd7f32;
                color: #000;
            }

            /* Card Header */
            .card-header {
                display: flex;
                align-items: center;
                margin-bottom: 12px;
                margin-top: 5px;
            }

            .repo-avatar {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                margin-right: 12px;
                border: 2px solid var(--border-color);
            }

            .owner-name {
                font-size: 0.9rem;
                color: var(--text-muted);
            }

            .repo-name {
                font-size: 1.1rem;
                font-weight: 600;
                color: var(--accent-blue);
                text-decoration: none;
                display: block;
                margin-bottom: 8px;
            }

            .repo-name:hover {
                text-decoration: underline;
            }

            /* Description */
            .repo-desc {
                color: var(--text-main);
                font-size: 0.9rem;
                flex-grow: 1;
                margin-bottom: 16px;
                line-height: 1.4;
                display: -webkit-box;
                -webkit-line-clamp: 3;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }

            /* Topics */
            .topics-container {
                display: flex;
                flex-wrap: wrap;
                gap: 6px;
                margin-bottom: 16px;
                min-height: 26px;
            }

            .topic-tag {
                background-color: rgba(56, 139, 253, 0.1);
                color: #58a6ff;
                padding: 2px 8px;
                border-radius: 12px;
                font-size: 0.7rem;
                font-weight: 500;
            }

            /* Card Footer */
            .card-footer {
                display: flex;
                justify-content: space-between;
                align-items: center;
                border-top: 1px solid var(--border-color);
                padding-top: 12px;
                margin-top: auto;
                flex-wrap: wrap;
                gap: 10px;
            }

            .meta {
                display: flex;
                gap: 12px;
                font-size: 0.85rem;
                color: var(--text-muted);
            }

            .meta-item {
                display: flex;
                align-items: center;
                gap: 4px;
            }

            .lang-dot {
                height: 10px;
                width: 10px;
                border-radius: 50%;
                display: inline-block;
            }

            /* --- BLUESKY BUTTON STYLE (from user snippet) --- */
            .bsky-share-btn {
                display: inline-flex;
                align-items: center;
                gap: 0.4rem;
                padding: 0.4rem 0.7rem;
                border-radius: 999px;
                background: #1185fe;
                color: #fff;
                text-decoration: none;
                font-size: 0.8rem;
                font-weight: 500;
                white-space: nowrap;
                transition: opacity 0.2s;
            }

            .bsky-share-btn:hover {
                opacity: 0.9;
                color: #fff;
            }

            .bsky-share-btn svg {
                width: 1em;
                height: 1em;
            }

            .bsky-share-btn svg path {
                fill: #fff;
            }

            /* Language Colors */
            .lang-Python {
                background-color: #3572a5;
            }
            .lang-C {
                background-color: #555555;
            }
            .lang-Swift {
                background-color: #f05138;
            }
            .lang-HTML {
                background-color: #e34c26;
            }
            .lang-TypeScript {
                background-color: #3178c6;
            }
            .lang-JavaScript {
                background-color: #f1e05a;
            }
            .lang-Go {
                background-color: #00add8;
            }
            .lang-Rust {
                background-color: #dea584;
            }
            .lang-default {
                background-color: #8b949e;
            }

            /* Generic Icons */
            .icon {
                fill: currentColor;
                height: 16px;
                width: 16px;
                vertical-align: text-bottom;
            }
        </style>
    </head>
